<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gestor de Tareas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet" />
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUa6Y5Y3XnqK+6Q2k3Q5Q5h3QZ5a6g9q3Q5sX5Q=" crossorigin="anonymous">
<style>
:root {
  --bg: #0f0e17;
  --surface: #1a1928;
  --card: #22203a;
  --border: #2e2c4a;
  --accent1: #ff6b6b;
  --accent2: #ffd166;
  --accent3: #06d6a0;
  --accent4: #118ab2;
  --text: #fffffe;
  --muted: #7b7a9e;
  --col-w: 270px;
  --radius: 10px;
}
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
html,
body {
  min-height: 100%;
}
body {
  font-family: 'DM Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: auto;
}
header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  font-family: 'Fraunces', serif;
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--accent2);
  letter-spacing: -0.5px;
}
.logo span {
  color: var(--accent1);
  font-style: italic;
}
.board-title {
  font-size: 0.75rem;
  color: var(--muted);
  margin-left: auto;
  background: var(--card);
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color 0.2s;
}
.board-title:hover {
  border-color: var(--accent2);
}
#board-name-input {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: inherit;
  font-size: 0.75rem;
  width: 180px;
  text-align: right;
}
#toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 0.72rem;
  color: var(--muted);
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.25s, transform 0.25s;
  z-index: 999;
  pointer-events: none;
}
#toast.show {
  opacity: 1;
  transform: translateY(0);
}
#toast.error {
  border-color: var(--accent1);
  color: var(--accent1);
}
.board {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 24px;
  min-height: calc(100vh - 57px);
}
.column {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: var(--col-w);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  max-height: calc(100vh - 100px);
  transition: border-color 0.2s;
}
.column.drag-over {
  border-color: var(--accent2);
  box-shadow: 0 0 0 2px rgba(255, 209, 102, 0.15);
}
.col-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px 10px;
  gap: 8px;
  border-bottom: 1px solid var(--border);
}
.col-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.col-title {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: inherit;
  font-size: 0.78rem;
  font-weight: 500;
  flex: 1;
  cursor: text;
  letter-spacing: 0.3px;
}
.col-count {
  background: var(--card);
  border-radius: 12px;
  font-size: 0.65rem;
  color: var(--muted);
  padding: 2px 8px;
  min-width: 22px;
  text-align: center;
}
.col-delete {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
  padding: 0 2px;
  opacity: 0;
  transition: opacity 0.2s, color 0.2s;
}
.col-header:hover .col-delete {
  opacity: 1;
}
.col-delete:hover {
  color: var(--accent1);
}
.cards {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 10px 12px;
  cursor: grab;
  transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
  position: relative;
  animation: cardIn 0.2s ease;
}
@keyframes cardIn {
  from {
    opacity: 0;
    transform: translateY(-6px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
.card:hover {
  border-color: var(--muted);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
}
.card.dragging {
  opacity: 0.4;
  cursor: grabbing;
}
.card-tag {
  display: inline-block;
  font-size: 0.58rem;
  padding: 2px 7px;
  border-radius: 20px;
  margin-bottom: 6px;
  letter-spacing: 0.5px;
  font-weight: 500;
}
.card-text {
  font-size: 0.78rem;
  line-height: 1.5;
  color: var(--text);
  word-break: break-word;
}
.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 8px;
  gap: 6px;
}
.card-dates {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.card-date {
  font-size: 0.6rem;
  color: var(--muted);
}
.card-due {
  font-size: 0.6rem;
  padding: 1px 6px;
  border-radius: 10px;
  border: 1px solid var(--border);
  color: var(--muted);
  display: inline-block;
}
.card-due.overdue {
  border-color: var(--accent1);
  color: var(--accent1);
}
.card-due.soon {
  border-color: var(--accent2);
  color: var(--accent2);
}
.card-due.ok {
  border-color: var(--accent3);
  color: var(--accent3);
}
.card-delete {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 0.75rem;
  padding: 0;
  opacity: 0;
  transition: opacity 0.15s, color 0.15s;
  flex-shrink: 0;
}
.card:hover .card-delete {
  opacity: 1;
}
.card-delete:hover {
  color: var(--accent1);
}
.add-card-area {
  padding: 0 10px 10px;
}
.add-card-btn {
  width: 100%;
  background: none;
  border: 1px dashed var(--border);
  border-radius: 7px;
  color: var(--muted);
  font-family: inherit;
  font-size: 0.72rem;
  padding: 8px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
  text-align: left;
}
.add-card-btn:hover {
  border-color: var(--accent3);
  color: var(--accent3);
  background: rgba(6, 214, 160, 0.05);
}
.card-form {
  display: none;
  flex-direction: column;
  gap: 6px;
}
.card-form.active {
  display: flex;
}
.card-form textarea {
  background: var(--bg);
  border: 1px solid var(--accent3);
  border-radius: 7px;
  color: var(--text);
  font-family: inherit;
  font-size: 0.78rem;
  padding: 8px 10px;
  resize: none;
  outline: none;
  min-height: 70px;
}
.card-form-tags {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}
.tag-pick {
  border: none;
  border-radius: 20px;
  font-size: 0.62rem;
  padding: 3px 9px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 500;
  opacity: 0.55;
  transition: opacity 0.15s, transform 0.15s;
}
.tag-pick.selected {
  opacity: 1;
  transform: scale(1.05);
}
.card-form-due {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.65rem;
  color: var(--muted);
}
.card-form-due input[type='date'] {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: inherit;
  font-size: 0.65rem;
  padding: 4px 8px;
  outline: none;
  transition: border-color 0.2s;
  color-scheme: dark;
}
.card-form-due input[type='date']:focus {
  border-color: var(--accent4);
}
.card-form-actions {
  display: flex;
  gap: 6px;
}
.btn-add-card {
  background: var(--accent3);
  color: #000;
  border: none;
  border-radius: 6px;
  padding: 6px 14px;
  font-family: inherit;
  font-size: 0.72rem;
  cursor: pointer;
  font-weight: 500;
  transition: opacity 0.15s;
}
.btn-add-card:hover {
  opacity: 0.85;
}
.btn-add-card:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}
.btn-cancel {
  background: none;
  border: none;
  color: var(--muted);
  font-family: inherit;
  font-size: 0.72rem;
  cursor: pointer;
  transition: color 0.15s;
}
.btn-cancel:hover {
  color: var(--text);
}
.add-col-btn {
  background: rgba(255, 255, 255, 0.04);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  width: var(--col-w);
  flex-shrink: 0;
  height: 80px;
  color: var(--muted);
  font-family: inherit;
  font-size: 0.75rem;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s, color 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  align-self: flex-start;
}
.add-col-btn:hover {
  background: rgba(255, 255, 255, 0.07);
  border-color: var(--accent4);
  color: var(--accent4);
}
.drop-placeholder {
  height: 48px;
  border: 2px dashed var(--accent2);
  border-radius: 7px;
  background: rgba(255, 209, 102, 0.06);
  animation: pulse 1s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% {
    opacity: 0.5;
  }
  50% {
    opacity: 1;
  }
}
.cards::-webkit-scrollbar {
  width: 4px;
}
.cards::-webkit-scrollbar-track {
  background: transparent;
}
.cards::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 2px;
}
</style>
</head>
<body>
<header>
  <div class="logo">tareas<span>.</span></div>
  <div class="board-title">
    <input id="board-name-input" type="text" value="Mi Tablero" maxlength="40" spellcheck="false" />
  </div>
</header>

<div id="toast"></div>

<div class="board" id="board">
  <button class="add-col-btn" id="add-col-btn">＋ Nueva lista</button>
</div>

<script>
const CSRF = document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '';
const STORAGE_KEY = 'gestor-board-name';

const TAGS = [
  { label: 'urgente', color: '#ff6b6b', bg: 'rgba(255,107,107,0.18)' },
  { label: 'diseño', color: '#c77dff', bg: 'rgba(199,125,255,0.18)' },
  { label: 'dev', color: '#118ab2', bg: 'rgba(17,138,178,0.18)' },
  { label: 'docs', color: '#ffd166', bg: 'rgba(255,209,102,0.18)' },
  { label: 'ok', color: '#06d6a0', bg: 'rgba(6,214,160,0.18)' },
];

const COL_COLORS = ['#ff6b6b', '#ffd166', '#06d6a0', '#118ab2', '#c77dff', '#ff9f43'];
let data = { boardName: 'Mi Tablero', cols: [] };
let toastTimer;
let placeholder = null;

function today() {
  return new Date().toLocaleDateString('es-MX', { day: '2-digit', month: 'short' });
}

function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso + 'T00:00:00').toLocaleDateString('es-MX', { day: '2-digit', month: 'short' });
}

function dueClass(iso) {
  if (!iso) return '';
  const diff = (new Date(iso) - new Date()) / 86400000;
  if (diff < 0) return 'overdue';
  if (diff <= 2) return 'soon';
  return 'ok';
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    el.className = '';
  }, 2500);
}

async function api(method, path, body) {
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      'X-CSRFToken': CSRF,
    },
  };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch('/api/' + path, opts);
  if (!res.ok) throw new Error(`${method} /api/${path} → ${res.status}`);
  if (res.status === 204) return null;
  return res.json();
}

async function cargarTablero() {
  const savedName = localStorage.getItem(STORAGE_KEY);
  if (savedName) {
    data.boardName = savedName;
  }

  try {
    const cols = await api('GET', 'columnas/');
    data.cols = cols.map(c => ({
      id: c.id,
      title: c.titulo,
      color: c.color,
      cards: (c.tarjetas || []).map(t => ({
        id: t.id,
        text: t.texto,
        tag: t.etiqueta || '',
        date: t.creada
          ? new Date(t.creada).toLocaleDateString('es-MX', { day: '2-digit', month: 'short' })
          : today(),
        fecha_limite: t.fecha_limite || null,
      })),
    }));
    document.getElementById('board-name-input').value = data.boardName;
    document.title = data.boardName;
  } catch (err) {
    console.warn('API no disponible, tablero vacío.', err);
    toast('Sin conexión a la API', true);
  }
  render();
}

function render() {
  const board = document.getElementById('board');
  const addBtn = document.getElementById('add-col-btn');
  board.querySelectorAll('.column').forEach(c => c.remove());
  data.cols.forEach(col => board.insertBefore(buildColumn(col), addBtn));
}

function buildColumn(col) {
  const el = document.createElement('div');
  el.className = 'column';
  el.dataset.id = col.id;

  el.innerHTML = `
    <div class="col-header">
      <div class="col-dot" style="background:${col.color}"></div>
      <input class="col-title" value="${esc(col.title)}" maxlength="40" spellcheck="false" />
      <span class="col-count">${col.cards.length}</span>
      <button class="col-delete" title="Eliminar lista">✕</button>
    </div>
    <div class="cards" data-col="${col.id}"></div>
    <div class="add-card-area">
      <button class="add-card-btn">＋ Añadir tarjeta</button>
      <div class="card-form">
        <textarea placeholder="Describe la tarea..." rows="3"></textarea>
        <div class="card-form-tags">
          ${TAGS.map(t => `<button type="button" class="tag-pick" data-label="${t.label}" style="background:${t.bg};color:${t.color}">${t.label}</button>`).join('')}
        </div>
        <div class="card-form-due">
          <span>vence:</span>
          <input type="date" class="due-input" />
        </div>
        <div class="card-form-actions">
          <button type="button" class="btn-add-card">Agregar</button>
          <button type="button" class="btn-cancel">Cancelar</button>
        </div>
      </div>
    </div>
  `;

  el.querySelector('.col-title').addEventListener('change', async e => {
    const titulo = e.target.value.trim() || 'Sin nombre';
    col.title = titulo;
    try {
      await api('PATCH', `columnas/${col.id}/`, { titulo });
      toast('Lista renombrada');
    } catch {
      toast('Error al renombrar lista', true);
    }
  });

  el.querySelector('.col-delete').addEventListener('click', async () => {
    if (col.cards.length > 0 && !confirm(`¿Eliminar "${col.title}" y sus ${col.cards.length} tarjeta(s)?`)) return;
    try {
      await api('DELETE', `columnas/${col.id}/`);
      data.cols = data.cols.filter(c => c.id !== col.id);
      render();
      toast('Lista eliminada');
    } catch {
      toast('Error al eliminar lista', true);
    }
  });

  const cardsEl = el.querySelector('.cards');
  col.cards.forEach(card => cardsEl.appendChild(buildCard(card, col)));
  setupDrop(cardsEl, col);

  const addCardBtn = el.querySelector('.add-card-btn');
  const form = el.querySelector('.card-form');
  const textarea = form.querySelector('textarea');
  const dueInput = form.querySelector('.due-input');
  let selectedTag = null;

  addCardBtn.addEventListener('click', () => {
    addCardBtn.style.display = 'none';
    form.classList.add('active');
    textarea.focus();
  });

  form.querySelectorAll('.tag-pick').forEach(btn => {
    btn.addEventListener('click', () => {
      form.querySelectorAll('.tag-pick').forEach(b => b.classList.remove('selected'));
      selectedTag = selectedTag === btn.dataset.label ? null : btn.dataset.label;
      if (selectedTag) btn.classList.add('selected');
    });
  });

  const submitBtn = form.querySelector('.btn-add-card');
  submitBtn.addEventListener('click', async () => {
    const text = textarea.value.trim();
    if (!text) return;
    submitBtn.disabled = true;
    try {
      const payload = {
        columna: col.id,
        texto: text,
        etiqueta: selectedTag || '',
        orden: col.cards.length,
        fecha_limite: dueInput.value || null,
      };
      const created = await api('POST', 'tarjetas/', payload);
      const card = {
        id: created.id,
        text: created.texto,
        tag: created.etiqueta || '',
        date: created.creada
          ? new Date(created.creada).toLocaleDateString('es-MX', { day: '2-digit', month: 'short' })
          : today(),
        fecha_limite: created.fecha_limite || null,
      };
      col.cards.push(card);
      cardsEl.appendChild(buildCard(card, col));
      el.querySelector('.col-count').textContent = col.cards.length;
      textarea.value = '';
      dueInput.value = '';
      selectedTag = null;
      form.querySelectorAll('.tag-pick').forEach(b => b.classList.remove('selected'));
      toast('Tarjeta creada');
    } catch {
      toast('Error al crear tarjeta', true);
    }
    submitBtn.disabled = false;
  });

  form.querySelector('.btn-cancel').addEventListener('click', () => {
    form.classList.remove('active');
    addCardBtn.style.display = '';
    textarea.value = '';
    dueInput.value = '';
    selectedTag = null;
    form.querySelectorAll('.tag-pick').forEach(b => b.classList.remove('selected'));
  });

  return el;
}

function buildCard(card, col) {
  const el = document.createElement('div');
  el.className = 'card';
  el.draggable = true;
  el.dataset.id = card.id;
  el.dataset.col = col.id;

  const tag = card.tag ? TAGS.find(t => t.label === card.tag) : null;
  const dc = dueClass(card.fecha_limite);

  el.innerHTML = `
    ${tag ? `<span class="card-tag" style="background:${tag.bg};color:${tag.color}">${tag.label}</span>` : ''}
    <div class="card-text">${esc(card.text)}</div>
    <div class="card-footer">
      <div class="card-dates">
        <span class="card-date">${card.date}</span>
        ${card.fecha_limite ? `<span class="card-due ${dc}">⏱ ${formatDate(card.fecha_limite)}</span>` : ''}
      </div>
      <button class="card-delete" title="Eliminar">✕</button>
    </div>
  `;

  el.querySelector('.card-delete').addEventListener('click', async e => {
    e.stopPropagation();
    try {
      await api('DELETE', `tarjetas/${card.id}/`);
      col.cards = col.cards.filter(c => c.id !== card.id);
      el.remove();
      document.querySelector(`.column[data-id="${col.id}"] .col-count`).textContent = col.cards.length;
      toast('Tarjeta eliminada');
    } catch {
      toast('Error al eliminar tarjeta', true);
    }
  });

  el.addEventListener('dragstart', e => {
    e.dataTransfer.setData('card_id', card.id);
    e.dataTransfer.setData('from_col', col.id);
    setTimeout(() => el.classList.add('dragging'), 0);
  });
  el.addEventListener('dragend', () => el.classList.remove('dragging'));

  return el;
}

function setupDrop(cardsEl, col) {
  cardsEl.addEventListener('dragover', e => {
    e.preventDefault();
    cardsEl.closest('.column').classList.add('drag-over');
    if (!placeholder) {
      placeholder = document.createElement('div');
      placeholder.className = 'drop-placeholder';
    }
    const afterEl = getDragAfterEl(cardsEl, e.clientY);
    afterEl ? cardsEl.insertBefore(placeholder, afterEl) : cardsEl.appendChild(placeholder);
  });

  cardsEl.addEventListener('dragleave', e => {
    if (!cardsEl.contains(e.relatedTarget)) {
      cardsEl.closest('.column').classList.remove('drag-over');
      placeholder?.remove();
      placeholder = null;
    }
  });

  cardsEl.addEventListener('drop', async e => {
    e.preventDefault();
    cardsEl.closest('.column').classList.remove('drag-over');

    const cardId = e.dataTransfer.getData('card_id');
    const fromColId = e.dataTransfer.getData('from_col');
    const fromCol = data.cols.find(c => c.id == fromColId);
    const toCol = col;
    if (!fromCol) return;

    const cardIndex = fromCol.cards.findIndex(c => c.id == cardId);
    const card = fromCol.cards.splice(cardIndex, 1)[0];
    if (!card) return;

    const afterEl = placeholder?.nextElementSibling;
    let toIndex = toCol.cards.length;
    if (afterEl && afterEl.dataset.id) {
      const idx = toCol.cards.findIndex(c => c.id == afterEl.dataset.id);
      if (idx >= 0) toIndex = idx;
    }
    toCol.cards.splice(toIndex, 0, card);

    placeholder?.remove();
    placeholder = null;

    try {
      const payload = toCol.cards.map((c, i) => ({
        id: c.id,
        columna: toCol.id,
        orden: i,
      }));
      if (fromCol.id !== toCol.id) {
        fromCol.cards.forEach((c, i) => payload.push({ id: c.id, columna: fromCol.id, orden: i }));
      }
      await api('POST', 'tarjetas/reorder/', payload);
      render();
    } catch {
      toast('Error al guardar orden', true);
    }
  });
}

function getDragAfterEl(container, y) {
  const els = [...container.querySelectorAll('.card:not(.dragging)')];
  return els.reduce(
    (closest, el) => {
      const box = el.getBoundingClientRect();
      const offset = y - box.top - box.height / 2;
      if (offset < 0 && offset > closest.offset) {
        return { offset, el };
      }
      return closest;
    },
    { offset: Number.NEGATIVE_INFINITY },
  ).el;
}

const addColBtn = document.getElementById('add-col-btn');
addColBtn.addEventListener('click', async () => {
  const color = COL_COLORS[data.cols.length % COL_COLORS.length];
  try {
    const created = await api('POST', 'columnas/', {
      titulo: 'Nueva lista',
      color,
      orden: data.cols.length,
    });
    data.cols.push({ id: created.id, title: created.titulo, color: created.color, cards: [] });
    render();
    setTimeout(() => {
      const cols = document.querySelectorAll('.col-title');
      cols[cols.length - 1]?.focus();
      cols[cols.length - 1]?.select();
    }, 50);
    toast('Lista creada');
  } catch {
    toast('Error al crear lista', true);
  }
});

const boardInput = document.getElementById('board-name-input');
boardInput.addEventListener('change', () => {
  data.boardName = boardInput.value.trim() || 'Mi Tablero';
  localStorage.setItem(STORAGE_KEY, data.boardName);
  document.title = data.boardName;
});

cargarTablero();
