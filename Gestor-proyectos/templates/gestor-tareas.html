<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de Tareas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1928;
    --card: #22203a;
    --border: #2e2c4a;
    --accent1: #ff6b6b;
    --accent2: #ffd166;
    --accent3: #06d6a0;
    --accent4: #118ab2;
    --text: #fffffe;
    --muted: #7b7a9e;
    --col-w: 270px;
    --radius: 10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: auto;
  }

  /* --- HEADER --- */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--accent2);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent1); font-style: italic; }

  .board-title {
    font-size: 0.75rem;
    color: var(--muted);
    margin-left: auto;
    background: var(--card);
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .board-title:hover { border-color: var(--accent2); }
  .board-title:focus-within { border-color: var(--accent2); }
  #board-name-input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: inherit;
    font-size: 0.75rem;
    width: 160px;
    text-align: right;
  }

  /* --- BOARD --- */
  .board {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 24px;
    min-height: calc(100vh - 57px);
  }

  /* --- COLUMN --- */
  .column {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: var(--col-w);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 100px);
    transition: border-color 0.2s;
  }
  .column.drag-over { border-color: var(--accent2); box-shadow: 0 0 0 2px rgba(255,209,102,0.15); }

  .col-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px 10px;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }

  .col-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .col-title {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 500;
    flex: 1;
    cursor: text;
    letter-spacing: 0.3px;
  }

  .col-count {
    background: var(--card);
    border-radius: 12px;
    font-size: 0.65rem;
    color: var(--muted);
    padding: 2px 8px;
    min-width: 22px;
    text-align: center;
  }

  .col-delete {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 0 2px;
    transition: color 0.2s;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .col-header:hover .col-delete { opacity: 1; }
  .col-delete:hover { color: var(--accent1); }

  /* --- CARDS --- */
  .cards {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px 12px;
    cursor: grab;
    transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
    position: relative;
    animation: cardIn 0.2s ease;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card:hover {
    border-color: var(--muted);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .card.dragging {
    opacity: 0.4;
    cursor: grabbing;
  }

  .card-tag {
    display: inline-block;
    font-size: 0.58rem;
    padding: 2px 7px;
    border-radius: 20px;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
    font-weight: 500;
  }

  .card-text {
    font-size: 0.78rem;
    line-height: 1.5;
    color: var(--text);
    word-break: break-word;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
  }

  .card-date {
    font-size: 0.6rem;
    color: var(--muted);
  }

  .card-delete {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.75rem;
    padding: 0;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
  }
  .card:hover .card-delete { opacity: 1; }
  .card-delete:hover { color: var(--accent1); }

  /* --- ADD CARD --- */
  .add-card-area { padding: 0 10px 10px; }

  .add-card-btn {
    width: 100%;
    background: none;
    border: 1px dashed var(--border);
    border-radius: 7px;
    color: var(--muted);
    font-family: inherit;
    font-size: 0.72rem;
    padding: 8px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    text-align: left;
  }
  .add-card-btn:hover {
    border-color: var(--accent3);
    color: var(--accent3);
    background: rgba(6,214,160,0.05);
  }

  .card-form {
    display: none;
    flex-direction: column;
    gap: 6px;
  }
  .card-form.active { display: flex; }

  .card-form textarea {
    background: var(--bg);
    border: 1px solid var(--accent3);
    border-radius: 7px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.78rem;
    padding: 8px 10px;
    resize: none;
    outline: none;
    min-height: 70px;
  }

  .card-form-tags {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .tag-pick {
    border: none;
    border-radius: 20px;
    font-size: 0.62rem;
    padding: 3px 9px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    opacity: 0.55;
    transition: opacity 0.15s, transform 0.15s;
  }
  .tag-pick.selected { opacity: 1; transform: scale(1.05); }

  .card-form-actions {
    display: flex;
    gap: 6px;
  }

  .btn-add-card {
    background: var(--accent3);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-family: inherit;
    font-size: 0.72rem;
    cursor: pointer;
    font-weight: 500;
    transition: opacity 0.15s;
  }
  .btn-add-card:hover { opacity: 0.85; }

  .btn-cancel {
    background: none;
    border: none;
    color: var(--muted);
    font-family: inherit;
    font-size: 0.72rem;
    cursor: pointer;
    transition: color 0.15s;
  }
  .btn-cancel:hover { color: var(--text); }

  /* --- ADD COLUMN --- */
  .add-col-btn {
    background: rgba(255,255,255,0.04);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    width: var(--col-w);
    flex-shrink: 0;
    height: 80px;
    color: var(--muted);
    font-family: inherit;
    font-size: 0.75rem;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    align-self: flex-start;
  }
  .add-col-btn:hover {
    background: rgba(255,255,255,0.07);
    border-color: var(--accent4);
    color: var(--accent4);
  }

  /* --- DRAG PLACEHOLDER --- */
  .drop-placeholder {
    height: 48px;
    border: 2px dashed var(--accent2);
    border-radius: 7px;
    background: rgba(255,209,102,0.06);
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.5; }
    50%      { opacity: 1; }
  }

  /* --- SCROLLBAR --- */
  .cards::-webkit-scrollbar { width: 4px; }
  .cards::-webkit-scrollbar-track { background: transparent; }
  .cards::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">tareas<span>.</span></div>
  <div class="board-title">
    <input id="board-name-input" type="text" value="Mi Tablero" maxlength="40" spellcheck="false"/>
  </div>
</header>

<div class="board" id="board">
  <!-- columns injected by JS -->
  <button class="add-col-btn" id="add-col-btn">＋ Nueva lista</button>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
const TAGS = [
  { label: 'urgente', color: '#ff6b6b', bg: 'rgba(255,107,107,0.18)' },
  { label: 'diseño',  color: '#c77dff', bg: 'rgba(199,125,255,0.18)' },
  { label: 'dev',     color: '#118ab2', bg: 'rgba(17,138,178,0.18)'  },
  { label: 'docs',    color: '#ffd166', bg: 'rgba(255,209,102,0.18)' },
  { label: 'ok',      color: '#06d6a0', bg: 'rgba(6,214,160,0.18)'  },
];

const COL_COLORS = ['#ff6b6b','#ffd166','#06d6a0','#118ab2','#c77dff','#ff9f43'];

let data = loadData() || {
  boardName: 'Mi Tablero',
  cols: [
    { id: uid(), title: 'Por hacer', color: '#ffd166', cards: [
      { id: uid(), text: 'Revisar maquetas de la app', tag: 'diseño', date: today() },
      { id: uid(), text: 'Definir modelos de Django', tag: 'dev', date: today() },
    ]},
    { id: uid(), title: 'En progreso', color: '#06d6a0', cards: [
      { id: uid(), text: 'Configurar entorno Docker', tag: 'dev', date: today() },
    ]},
    { id: uid(), title: 'Completado', color: '#118ab2', cards: [
      { id: uid(), text: 'Crear repositorio en GitHub', tag: 'ok', date: today() },
    ]},
  ]
};

// ─── UTILS ──────────────────────────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2,9); }
function today() { return new Date().toLocaleDateString('es-MX', {day:'2-digit',month:'short'}); }

function saveData() {
  localStorage.setItem('gestor_tareas', JSON.stringify(data));
}
async function cargarTablero() {
    const res = await fetch('/api/columnas/');
    const cols = await res.json();
    data.cols = cols.map(c => ({
        id: c.id,
        title: c.titulo,
        color: c.color,
        cards: c.tarjetas.map(t => ({
            id: t.id, text: t.texto, tag: t.etiqueta, date: t.creada
        }))
    }));
    render();
}

// ─── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  const board = document.getElementById('board');
  const addBtn = document.getElementById('add-col-btn');
  // remove all columns
  board.querySelectorAll('.column').forEach(c => c.remove());

  data.cols.forEach(col => {
    const el = buildColumn(col);
    board.insertBefore(el, addBtn);
  });

  saveData();
}

function buildColumn(col) {
  const el = document.createElement('div');
  el.className = 'column';
  el.dataset.id = col.id;

  el.innerHTML = `
    <div class="col-header">
      <div class="col-dot" style="background:${col.color}"></div>
      <input class="col-title" value="${esc(col.title)}" maxlength="40" spellcheck="false"/>
      <span class="col-count">${col.cards.length}</span>
      <button class="col-delete" title="Eliminar lista">✕</button>
    </div>
    <div class="cards" data-col="${col.id}"></div>
    <div class="add-card-area">
      <button class="add-card-btn">＋ Añadir tarjeta</button>
      <div class="card-form">
        <textarea placeholder="Describe la tarea..." rows="3"></textarea>
        <div class="card-form-tags">
          ${TAGS.map(t => `<button class="tag-pick" data-label="${t.label}" style="background:${t.bg};color:${t.color}">${t.label}</button>`).join('')}
        </div>
        <div class="card-form-actions">
          <button class="btn-add-card">Agregar</button>
          <button class="btn-cancel">Cancelar</button>
        </div>
      </div>
    </div>
  `;

  // column title edit
  el.querySelector('.col-title').addEventListener('change', e => {
    col.title = e.target.value.trim() || 'Sin nombre';
    saveData();
  });

  // delete column
  el.querySelector('.col-delete').addEventListener('click', () => {
    if (col.cards.length > 0 && !confirm(`¿Eliminar "${col.title}" y sus ${col.cards.length} tarjeta(s)?`)) return;
    data.cols = data.cols.filter(c => c.id !== col.id);
    render();
  });

  // render cards
  const cardsEl = el.querySelector('.cards');
  col.cards.forEach(card => cardsEl.appendChild(buildCard(card, col)));
  setupDrop(cardsEl, col);

  // add card toggle
  const addBtn = el.querySelector('.add-card-btn');
  const form = el.querySelector('.card-form');
  const textarea = form.querySelector('textarea');
  let selectedTag = null;

  addBtn.addEventListener('click', () => {
    addBtn.style.display = 'none';
    form.classList.add('active');
    textarea.focus();
  });

  // tag selection
  form.querySelectorAll('.tag-pick').forEach(btn => {
    btn.addEventListener('click', () => {
      form.querySelectorAll('.tag-pick').forEach(b => b.classList.remove('selected'));
      if (selectedTag === btn.dataset.label) {
        selectedTag = null;
      } else {
        btn.classList.add('selected');
        selectedTag = btn.dataset.label;
      }
    });
  });

  form.querySelector('.btn-add-card').addEventListener('click', () => {
    const text = textarea.value.trim();
    if (!text) return;
    const card = { id: uid(), text, tag: selectedTag, date: today() };
    col.cards.push(card);
    cardsEl.appendChild(buildCard(card, col));
    el.querySelector('.col-count').textContent = col.cards.length;
    textarea.value = '';
    selectedTag = null;
    form.querySelectorAll('.tag-pick').forEach(b => b.classList.remove('selected'));
    saveData();
  });

  form.querySelector('.btn-cancel').addEventListener('click', () => {
    form.classList.remove('active');
    addBtn.style.display = '';
    textarea.value = '';
  });

  return el;
}

function buildCard(card, col) {
  const el = document.createElement('div');
  el.className = 'card';
  el.draggable = true;
  el.dataset.id = card.id;
  el.dataset.col = col.id;

  const tag = card.tag ? TAGS.find(t => t.label === card.tag) : null;

  el.innerHTML = `
    ${tag ? `<span class="card-tag" style="background:${tag.bg};color:${tag.color}">${tag.label}</span>` : ''}
    <div class="card-text">${esc(card.text)}</div>
    <div class="card-footer">
      <span class="card-date">${card.date}</span>
      <button class="card-delete" title="Eliminar">✕</button>
    </div>
  `;

  el.querySelector('.card-delete').addEventListener('click', e => {
    e.stopPropagation();
    col.cards = col.cards.filter(c => c.id !== card.id);
    el.remove();
    document.querySelector(`.column[data-id="${col.id}"] .col-count`).textContent = col.cards.length;
    saveData();
  });

  // drag
  el.addEventListener('dragstart', e => {
    e.dataTransfer.setData('card_id', card.id);
    e.dataTransfer.setData('from_col', col.id);
    setTimeout(() => el.classList.add('dragging'), 0);
  });
  el.addEventListener('dragend', () => el.classList.remove('dragging'));

  return el;
}

// ─── DRAG & DROP ────────────────────────────────────────────────────────────
let placeholder = null;

function setupDrop(cardsEl, col) {
  cardsEl.addEventListener('dragover', e => {
    e.preventDefault();
    cardsEl.closest('.column').classList.add('drag-over');
    if (!placeholder) {
      placeholder = document.createElement('div');
      placeholder.className = 'drop-placeholder';
    }
    const afterEl = getDragAfterEl(cardsEl, e.clientY);
    if (afterEl) {
      cardsEl.insertBefore(placeholder, afterEl);
    } else {
      cardsEl.appendChild(placeholder);
    }
  });

  cardsEl.addEventListener('dragleave', e => {
    if (!cardsEl.contains(e.relatedTarget)) {
      cardsEl.closest('.column').classList.remove('drag-over');
      placeholder?.remove();
      placeholder = null;
    }
  });

  cardsEl.addEventListener('drop', e => {
    e.preventDefault();
    cardsEl.closest('.column').classList.remove('drag-over');

    const cardId = e.dataTransfer.getData('card_id');
    const fromColId = e.dataTransfer.getData('from_col');

    const fromCol = data.cols.find(c => c.id === fromColId);
    const toCol = col;

    const cardIndex = fromCol.cards.findIndex(c => c.id === cardId);
    const card = fromCol.cards.splice(cardIndex, 1)[0];

    // find insert index by placeholder position
    const afterEl = placeholder?.nextElementSibling;
    let toIndex = toCol.cards.length;
    if (afterEl && afterEl.dataset.id) {
      toIndex = toCol.cards.findIndex(c => c.id === afterEl.dataset.id);
      if (toIndex < 0) toIndex = toCol.cards.length;
    }

    toCol.cards.splice(toIndex, 0, card);

    placeholder?.remove();
    placeholder = null;

    render();
  });
}

function getDragAfterEl(container, y) {
  const els = [...container.querySelectorAll('.card:not(.dragging)')];
  return els.reduce((closest, el) => {
    const box = el.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) return { offset, el };
    return closest;
  }, { offset: Number.NEGATIVE_INFINITY }).el;
}

// ─── ADD COLUMN ─────────────────────────────────────────────────────────────
document.getElementById('add-col-btn').addEventListener('click', () => {
  const color = COL_COLORS[data.cols.length % COL_COLORS.length];
  data.cols.push({ id: uid(), title: 'Nueva lista', color, cards: [] });
  render();
  // focus new column title
  setTimeout(() => {
    const cols = document.querySelectorAll('.col-title');
    cols[cols.length - 1]?.focus();
    cols[cols.length - 1]?.select();
  }, 50);
});

// ─── BOARD NAME ─────────────────────────────────────────────────────────────
const boardInput = document.getElementById('board-name-input');
boardInput.value = data.boardName || 'Mi Tablero';
boardInput.addEventListener('change', () => {
  data.boardName = boardInput.value.trim() || 'Mi Tablero';
  saveData();
});

// ─── HELPERS ────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── INIT ────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
